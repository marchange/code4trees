<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeArena — IDE Workspace</title>
<meta name="description" content="Professionelle Coding-Umgebung.">

<link rel="icon" type="image/jpeg" href="icon.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: #080c08; 
    color: #DFDFDF;
    display: flex;
    flex-direction: column;
  }

  :root {
    --ide-border: rgba(127, 176, 105, 0.15);
    --ide-bg-sidebar: rgba(10, 14, 10, 0.98);
    --ide-bg-main: rgba(14, 20, 14, 0.95);
    --ide-bg-console: rgba(6, 9, 6, 0.98);
    --ide-hover: rgba(255, 255, 255, 0.05);
    --ide-active: rgba(127, 176, 105, 0.1);
    --bug-color: #e8c547;
    --chal-color: #7fb069;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  .ide-layout {
    display: flex;
    flex: 1;
    height: 100vh;
    width: 100vw;
    position: relative;
    z-index: 10;
    /* Etwas Platz oben für die schwebende DevBar */
    padding-top: 80px; 
    box-sizing: border-box;
  }

  /* --- LEFT SIDEBAR --- */
  .sidebar-left {
    width: 260px;
    flex-shrink: 0;
    background: var(--ide-bg-sidebar);
    border-right: 1px solid var(--ide-border);
    border-top: 1px solid var(--ide-border);
    border-top-right-radius: 8px;
    display: flex;
    flex-direction: column;
    z-index: 20;
    margin-left: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  .nav-header {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    padding: 20px 20px 10px 20px;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .explorer {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
  }

  .category-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--paper-dim);
    text-align: left;
    padding: 8px 20px;
    font-family: var(--mono);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, color 0.2s;
  }
  .category-btn:hover { background: var(--ide-hover); color: #fff; }
  .category-icon { font-size: 1rem; width: 20px; text-align: center; }
  .category-chevron { margin-left: auto; font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s; }
  .category-item.open .category-chevron { transform: rotate(90deg); }
  
  .task-list {
    display: none;
    list-style: none;
    margin: 0;
    padding: 0;
    background: rgba(0,0,0,0.2);
  }
  .category-item.open .task-list { display: block; }
  
  .task-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.6);
    text-align: left;
    padding: 8px 20px 8px 48px;
    font-family: var(--mono);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-btn:hover { color: #fff; background: rgba(255,255,255,0.02); }
  .task-btn.active { color: var(--leaf); background: var(--ide-active); border-left-color: var(--leaf); }
  .task-btn .status { margin-right: 6px; font-size: 0.7rem; }
  .task-btn.solved { color: rgba(255,255,255,0.4); }
  .task-btn.solved.active { color: var(--leaf); }

  .user-stats {
    padding: 15px 20px;
    border-top: 1px solid var(--ide-border);
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--leaf);
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.3);
  }

  /* --- MIDDLE WORKSPACE --- */
  .workspace-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--ide-bg-main);
    border-top: 1px solid var(--ide-border);
    margin-bottom: 20px;
    min-width: 0;
  }

  .placeholder-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.3);
    font-family: var(--mono);
    font-size: 0.9rem;
  }
  .placeholder-screen .icon { font-size: 3rem; margin-bottom: 20px; opacity: 0.5; }

  .workspace-inner {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .task-header-area {
    padding: 20px 30px;
    border-bottom: 1px solid var(--ide-border);
    flex-shrink: 0;
    max-height: 30vh;
    overflow-y: auto;
  }
  .task-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .task-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.5rem; margin: 0; color: #fff; }
  
  .badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: bold;
  }
  .badge.easy { color: var(--leaf); border: 1px solid var(--leaf); background: rgba(127, 176, 105, 0.1); }
  .badge.medium { color: var(--bug-color); border: 1px solid var(--bug-color); background: rgba(232, 197, 71, 0.1); }
  .badge.xp { color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); }

  .task-desc { font-size: 0.9rem; line-height: 1.6; color: #CCC; margin: 10px 0; }
  .task-example {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-left: 2px solid var(--leaf);
    margin: 0;
    white-space: pre-wrap;
  }

  /* Editor */
  .editor-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    background: transparent;
    overflow: hidden;
  }
  .editor-tabs {
    height: 35px;
    background: rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--ide-border);
  }
  .editor-tab {
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--leaf);
    border-top: 2px solid var(--leaf);
    background: rgba(255,255,255,0.03);
    gap: 8px;
  }
  
  .editor-core {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .editor-lines {
    width: 40px;
    background: rgba(0,0,0,0.2);
    border-right: 1px solid var(--ide-border);
    padding: 15px 0;
    text-align: right;
    padding-right: 12px;
    font-family: var(--mono);
    font-size: 0.9rem;
    color: rgba(255,255,255,0.2);
    user-select: none;
    line-height: 1.6;
    overflow: hidden;
  }
  .editor-textarea {
    flex: 1;
    background: transparent;
    border: none;
    resize: none;
    outline: none;
    color: #E8E8E8;
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 15px;
    line-height: 1.6;
    tab-size: 4;
    caret-color: var(--leaf);
    white-space: pre;
    overflow: auto;
  }
  .editor-textarea::selection { background: rgba(127, 176, 105, 0.3); }

  .editor-actions {
    height: 50px;
    border-top: 1px solid var(--ide-border);
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }
  .action-btn {
    border: none;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s;
  }
  .action-btn:hover { opacity: 0.8; }
  .btn-ghost { background: transparent; border: 1px solid var(--ide-border); color: #fff; }
  .btn-run { background: var(--leaf); color: #000; }
  .btn-bug { background: var(--bug-color); color: #000; }
  .btn-next { background: #fff; color: #000; display: none; }

  /* --- RIGHT SIDEBAR --- */
  .sidebar-right {
    width: 320px;
    flex-shrink: 0;
    background: var(--ide-bg-console);
    border-left: 1px solid var(--ide-border);
    border-top: 1px solid var(--ide-border);
    border-top-left-radius: 8px;
    display: flex;
    flex-direction: column;
    z-index: 20;
    margin-right: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
  .console-header {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid var(--ide-border);
    font-family: var(--mono);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(0,0,0,0.3);
  }
  .console-body {
    flex: 1;
    padding: 15px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--paper-dim);
    overflow-y: auto;
    word-wrap: break-word;
  }
  
  .log-line { margin-bottom: 8px; line-height: 1.4; }
  .log-sys { color: rgba(255,255,255,0.4); }
  .log-success { color: var(--leaf); }
  .log-error { color: #ff6b6b; }
  .log-test { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 8px; margin-top: 6px; border-radius: 4px; }
  .log-test.pass { border-left: 2px solid var(--leaf); }
  .log-test.fail { border-left: 2px solid #ff6b6b; }

</style>
</head>
<body>

<div class="ambient-bg"></div>
<div class="floating-code" id="floatingCodeContainer"></div>

<nav class="devbar">
    <a href="index.html" class="devbar-brand">
      <span class="glyph">{}</span> code4trees
    </a>
    
    <div class="devbar-divider"></div>
    
    <div class="devbar-links">
      <a href="index.html" class="devbar-link">
        Dashboard
      </a>
      <a href="training.html" class="devbar-link active">
        Code-Arena <span class="devbar-shortcut">IDE</span>
      </a>
    </div>
  </nav>

<div class="ide-layout">
  
  <aside class="sidebar-left">
    <div class="nav-header">Explorer</div>
    
    <div class="explorer" id="explorer">
      </div>

    <div class="user-stats">
      <span id="xp-display">0 XP</span>
      <span id="progress-display">0 / 8 gelöst</span>
    </div>
  </aside>

  <main class="workspace-main">
    
    <div class="placeholder-screen" id="placeholder">
      <div class="icon">⚡</div>
      <div>Wähle eine Aufgabe im Explorer aus</div>
    </div>

    <div class="workspace-inner" id="workspace">
      
      <div class="task-header-area">
        <div class="task-meta">
          <h1 class="task-title" id="t-title">Task Title</h1>
          <span class="badge" id="t-diff">EASY</span>
          <span class="badge xp" id="t-xp">100 XP</span>
        </div>
        <div class="task-desc" id="t-desc">Task description goes here.</div>
        <pre class="task-example" id="t-example">Example data</pre>
      </div>

      <div class="editor-wrapper">
        <div class="editor-tabs">
          <div class="editor-tab">
            <span>📝</span> <span id="t-filename">script.js</span>
          </div>
        </div>
        
        <div class="editor-core">
          <div class="editor-lines" id="editor-lines">1</div>
          <textarea class="editor-textarea" id="editor-textarea" spellcheck="false" autocomplete="off"></textarea>
        </div>
        
        <div class="editor-actions">
          <button class="action-btn btn-ghost" id="btn-reset">↺ Reset</button>
          <button class="action-btn btn-run" id="btn-run">▶ Run Code</button>
          <button class="action-btn btn-next" id="btn-next">Next Challenge ➔</button>
        </div>
      </div>
      
    </div>
  </main>

  <aside class="sidebar-right">
    <div class="console-header">
      >_ Terminal Output
    </div>
    <div class="console-body" id="console">
      <div class="log-line log-sys">> IDE initialized.</div>
      <div class="log-line log-sys">> Workspace connected to main server.</div>
      <div class="log-line log-sys">> Waiting for execution...</div>
    </div>
  </aside>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  function generateAmbientCode() {
    const container = document.getElementById('floatingCodeContainer');
    if (!container) return;
    const symbols = ['{}', '</>', '[]', '()', '=>', '&&', '||', ';'];
    for (let i = 0; i < 15; i++) {
      const el = document.createElement('div');
      el.className = 'code-particle';
      el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = `${Math.random() * 100}vw`;
      el.style.animationDuration = `${10 + Math.random() * 20}s`;
      el.style.animationDelay = `${Math.random() * 10}s`;
      el.style.fontSize = `${1 + Math.random() * 1.5}rem`;
      container.appendChild(el);
    }
  }
  generateAmbientCode();

  const categories = [
    { id: 'cat-chal', icon: '📚', name: 'Challenges' },
    { id: 'cat-bug', icon: '🐞', name: 'Bug Hunter' },
    { id: 'cat-algo', icon: '🧠', name: 'Algorithms' },
    { id: 'cat-str', icon: '🔤', name: 'Strings' },
    { id: 'cat-arr', icon: '📦', name: 'Arrays' }
  ];

  const tasks = [
    { id: 1, catId: 'cat-arr', type: 'challenge', title: 'Two Sum Basics', difficulty: 'Easy', xp: 100, fnName: 'twoSum',
      desc: 'Gegeben ist ein Array mit Zahlen (nums) und ein Zielwert (target). Finde die Indizes der zwei Zahlen, deren Summe genau den Zielwert ergibt.',
      example: 'Input: nums = [2, 7, 11, 15], target = 9\nOutput: [0, 1]',
      code: 'function twoSum(nums, target) {\n    // Code here\n    \n}',
      tests: [{ inputs: [[2, 7, 11, 15], 9], expected: [0, 1] }, { inputs: [[3, 2, 4], 6], expected: [1, 2] }]
    },
    { id: 2, catId: 'cat-str', type: 'challenge', title: 'Reverse String', difficulty: 'Easy', xp: 100, fnName: 'reverseString',
      desc: 'Drehe die Zeichenreihenfolge des übergebenen Strings um.',
      example: 'Input: "hello"\nOutput: "olleh"',
      code: 'function reverseString(str) {\n    // Code here\n    \n}',
      tests: [{ inputs: ["hello"], expected: "olleh" }, { inputs: ["a"], expected: "a" }]
    },
    { id: 3, catId: 'cat-algo', type: 'challenge', title: 'Find Maximum Number', difficulty: 'Easy', xp: 100, fnName: 'findMax',
      desc: 'Finde die größte Zahl in dem übergebenen Array.',
      example: 'Input: [3, 8, 2, 10, 5]\nOutput: 10',
      code: 'function findMax(numbers) {\n    // Code here\n    \n}',
      tests: [{ inputs: [[3, 8, 2, 10, 5]], expected: 10 }, { inputs: [[-1, -5, -2, -10]], expected: -1 }]
    },
    { id: 4, catId: 'cat-bug', type: 'bug', title: 'Array Calculator Bug', difficulty: 'Easy', xp: 150, fnName: 'calculateSum',
      desc: 'Die Funktion liefert fehlerhafte Ergebnisse (String-Verkettung). Finde und behebe den Fehler.',
      example: 'Erwartet bei [1, 2, 3]: 6\nAktuell: "123"',
      code: 'function calculateSum(numbers) {\n    let sum = ""; // Datentyp prüfen!\n    for(let i = 0; i < numbers.length; i++){\n        sum += numbers[i];\n    }\n    return sum;\n}',
      tests: [{ inputs: [[1, 2, 3, 4]], expected: 10 }, { inputs: [[10, 20]], expected: 30 }]
    },
    { id: 5, catId: 'cat-bug', type: 'bug', title: 'Login Validation Bug', difficulty: 'Easy', xp: 150, fnName: 'validateLogin',
      desc: 'Die Login-Funktion akzeptiert jeden beliebigen Nutzernamen. Finde den Syntax-Fehler.',
      example: 'Erwartet bei ("hacker", "1234"): false\nAktuell: true',
      code: 'function validateLogin(username, password){\n    if(username = "admin" && password == "1234"){\n        return true;\n    }\n    return false;\n}',
      tests: [{ inputs: ["admin", "1234"], expected: true }, { inputs: ["hacker", "1234"], expected: false }]
    },
    { id: 6, catId: 'cat-bug', type: 'bug', title: 'Shopping Cart Bug', difficulty: 'Medium', xp: 200, fnName: 'calculateTotal',
      desc: 'Der Warenkorb gibt immer nur den Preis des LETZTEN Artikels zurück anstatt die Summe.',
      example: 'Erwartet bei [{price: 10}, {price: 20}]: 30',
      code: 'function calculateTotal(items){\n    let total = 0;\n    items.forEach(item => {\n        total = item.price;\n    });\n    return total;\n}',
      tests: [{ inputs: [[{price: 10}, {price: 20}]], expected: 30 }, { inputs: [[{price: 5}, {price: 5}]], expected: 10 }]
    },
    { id: 7, catId: 'cat-bug', type: 'bug', title: 'User Search Bug', difficulty: 'Medium', xp: 200, fnName: 'searchUser',
      desc: 'Die Suche findet keine Nutzer, obwohl diese im Array existieren. Arrow-Function Return fehlt?',
      example: 'Erwartet bei "Bob": {name: "Bob"}\nAktuell: undefined',
      code: 'function searchUser(users, name){\n    return users.find(user => {\n        user.name.toLowerCase() === name.toLowerCase();\n    });\n}',
      tests: [{ inputs: [[{name: "Alice"}, {name: "Bob"}], "bob"], expected: {name: "Bob"} }, { inputs: [[{name: "Tom"}], "Jerry"], expected: undefined }]
    },
    { id: 8, catId: 'cat-bug', type: 'bug', title: 'Number Converter Bug', difficulty: 'Easy', xp: 150, fnName: 'convertTemperature',
      desc: 'Die Funktion soll Celsius in Fahrenheit umwandeln, aber die Formel ist leicht defekt.',
      example: 'Erwartet bei 0°C: 32\nAktuell: -32',
      code: 'function convertTemperature(celsius){\n    return celsius * 9 / 5 - 32;\n}',
      tests: [{ inputs: [0], expected: 32 }, { inputs: [100], expected: 212 }]
    }
  ];

  let state = JSON.parse(localStorage.getItem('ideState')) || { completed: [], xp: 0, codes: {} };
  let activeTaskId = null;

  const explorerEl = document.getElementById('explorer');
  const placeholderEl = document.getElementById('placeholder');
  const workspaceEl = document.getElementById('workspace');
  const textareaEl = document.getElementById('editor-textarea');
  const linesEl = document.getElementById('editor-lines');
  const consoleEl = document.getElementById('console');
  const btnReset = document.getElementById('btn-reset');
  const btnRun = document.getElementById('btn-run');
  const btnNext = document.getElementById('btn-next');

  function renderSidebar() {
    explorerEl.innerHTML = '';
    categories.forEach(cat => {
      const catTasks = tasks.filter(t => t.catId === cat.id);
      if(catTasks.length === 0) return;
      const catEl = document.createElement('div');
      catEl.className = 'category-item';
      
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      btn.innerHTML = `<span class="category-icon">${cat.icon}</span> ${cat.name} <span class="category-chevron">▶</span>`;
      btn.onclick = () => catEl.classList.toggle('open');
      
      const list = document.createElement('ul');
      list.className = 'task-list';
      
      catTasks.forEach((t, i) => {
        const isSolved = state.completed.includes(t.id);
        const isActive = activeTaskId === t.id;
        if (isActive) catEl.classList.add('open');
        const li = document.createElement('li');
        const tBtn = document.createElement('button');
        tBtn.className = `task-btn ${isSolved ? 'solved' : ''} ${isActive ? 'active' : ''}`;
        tBtn.innerHTML = `<span class="status">${isSolved ? '✓' : String(i+1).padStart(2,'0')}</span> ${t.title}`;
        tBtn.onclick = () => loadTask(t.id);
        li.appendChild(tBtn);
        list.appendChild(li);
      });
      catEl.appendChild(btn);
      catEl.appendChild(list);
      explorerEl.appendChild(catEl);
    });
    document.getElementById('xp-display').textContent = `${state.xp} XP`;
    document.getElementById('progress-display').textContent = `${state.completed.length} / ${tasks.length} gelöst`;
  }

  function loadTask(id) {
    activeTaskId = id;
    const task = tasks.find(t => t.id === id);
    placeholderEl.style.display = 'none';
    workspaceEl.style.display = 'flex';
    document.getElementById('t-title').textContent = task.title;
    const diffEl = document.getElementById('t-diff');
    diffEl.textContent = task.difficulty;
    diffEl.className = `badge ${task.difficulty.toLowerCase()}`;
    document.getElementById('t-xp').textContent = `+${task.xp} XP`;
    document.getElementById('t-desc').textContent = task.desc;
    document.getElementById('t-example').textContent = task.example;
    document.getElementById('t-filename').textContent = `${task.fnName}.js`;
    
    if(task.type === 'bug') {
      btnRun.textContent = '🐞 Find Bug';
      btnRun.className = 'action-btn btn-bug';
    } else {
      btnRun.textContent = '▶ Run Code';
      btnRun.className = 'action-btn btn-run';
    }
    btnNext.style.display = 'none';
    textareaEl.value = state.codes[id] || task.code;
    updateLines();
    logToConsole(`> Task loaded: ${task.title}. Ready to compile.`, 'sys');
    renderSidebar();
  }

  function updateLines() {
    const count = textareaEl.value.split('\n').length;
    linesEl.innerHTML = Array(count).fill(0).map((_, i) => i + 1).join('<br>');
  }

  textareaEl.addEventListener('input', () => {
    updateLines();
    if(activeTaskId) {
      state.codes[activeTaskId] = textareaEl.value;
      saveState();
    }
  });
  
  textareaEl.addEventListener('scroll', () => {
    linesEl.scrollTop = textareaEl.scrollTop;
  });

  textareaEl.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 4;
      updateLines();
    }
  });

  btnReset.addEventListener('click', () => {
    if(activeTaskId && confirm("Code zurücksetzen?")) {
      const task = tasks.find(t => t.id === activeTaskId);
      textareaEl.value = task.code;
      state.codes[activeTaskId] = task.code;
      saveState();
      updateLines();
      logToConsole('> Code reset to original state.', 'sys');
    }
  });

  function saveState() { localStorage.setItem('ideState', JSON.stringify(state)); }

  function logToConsole(htmlString, type = 'sys') {
    const div = document.createElement('div');
    div.className = `log-line log-${type}`;
    div.innerHTML = htmlString;
    consoleEl.appendChild(div);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function clearConsole() { consoleEl.innerHTML = ''; }

  function deepEqual(a, b) {
    if (a === b) return true;
    if (a == null || typeof a != "object" || b == null || typeof b != "object") return false;
    let keysA = Object.keys(a), keysB = Object.keys(b);
    if (keysA.length != keysB.length) return false;
    for (let key of keysA) {
      if (!keysB.includes(key) || !deepEqual(a[key], b[key])) return false;
    }
    return true;
  }

  btnRun.addEventListener('click', () => {
    if(!activeTaskId) return;
    const task = tasks.find(t => t.id === activeTaskId);
    const code = textareaEl.value;
    clearConsole();
    logToConsole(`> Compiling and running tests for ${task.fnName}...`, 'sys');
    
    setTimeout(() => {
      try {
        const executor = new Function(`
          ${code}
          if(typeof ${task.fnName} !== 'function') throw new Error("Function ${task.fnName} not found.");
          return ${task.fnName};
        `);
        const fn = executor();
        let passedAll = true;

        task.tests.forEach((tst, i) => {
          try {
            const argsCopy = JSON.parse(JSON.stringify(tst.inputs));
            const res = fn(...argsCopy);
            const passed = deepEqual(res, tst.expected);
            if(passed) {
              logToConsole(`<div class="log-test pass">✓ Test ${i+1} passed</div>`, 'success');
            } else {
              passedAll = false;
              logToConsole(`<div class="log-test fail">✗ Test ${i+1} failed<br><span style="opacity:0.6;font-size:0.85em">Input: ${JSON.stringify(tst.inputs)}<br>Expected: ${JSON.stringify(tst.expected)}<br>Got: ${JSON.stringify(res)}</span></div>`, 'error');
            }
          } catch(err) {
            passedAll = false;
            logToConsole(`<div class="log-test fail">✗ Test ${i+1} Runtime Error: ${err.message}</div>`, 'error');
          }
        });

        if(passedAll) {
          logToConsole('<br>> ALL TESTS PASSED! 🎉', 'success');
          if(!state.completed.includes(task.id)) {
            state.completed.push(task.id);
            state.xp += task.xp;
            saveState();
            renderSidebar();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          }
          const currentIndex = tasks.findIndex(t => t.id === task.id);
          if(currentIndex < tasks.length - 1) {
            btnNext.style.display = 'flex';
          }
        } else {
          logToConsole('<br>> Execution finished with errors.', 'error');
        }
      } catch(e) {
        logToConsole(`> Syntax/Compilation Error:<br><span style="color:#ff6b6b">${e.message}</span>`, 'error');
      }
    }, 300);
  });

  btnNext.addEventListener('click', () => {
    const currentIndex = tasks.findIndex(t => t.id === activeTaskId);
    if(currentIndex < tasks.length - 1) {
      loadTask(tasks[currentIndex + 1].id);
    }
  });

  renderSidebar();
});
</script>
</body>
</html>

name: 🚀 Deploy to IONOS Webspace

on:
  push:
    branches:
      - testing

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
    
    - name: 📂 Mirror files via SFTP
      uses: pressidium/lftp-mirror-action@v1
      with:
        host: ${{ secrets.SFTP_SERVER }}
        user: ${{ secrets.SFTP_USERNAME }}
        pass: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        localDir: './public'
        remoteDir: '/testing'
        reverse: true
        options: '--delete'
        ignoreFile: '.lftp_ignore'
